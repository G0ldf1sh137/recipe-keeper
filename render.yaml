# Render Blueprint — https://render.com/docs/blueprint-spec
#
# One-time setup after the first deploy from this blueprint:
#   1. In the Render dashboard, set the "sync: false" env vars below (Google OAuth
#      credentials, Anthropic API key) — they're deliberately left out of this file.
#   2. Add this service's redirect URI to the Google Cloud Console OAuth client's
#      "Authorized redirect URIs": https://recipe-keeper.onrender.com/auth/google/callback
#      (update the GOOGLE_REDIRECT_URI value below to match if you use a custom domain).
#
# The database is a managed Render Postgres instance — DATABASE_URL is wired up
# automatically via fromDatabase, no manual connection string needed.
#
# The persistent disk holds only uploaded recipe photos now that the database is
# Postgres — without it, every deploy would wipe uploaded images. Disks require a
# paid instance type (the free plan doesn't support them).
databases:
  - name: recipe-keeper-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "17"

services:
  - type: web
    name: recipe-keeper
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run db:migrate && npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: recipe-keeper-db
          property: connectionString
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: GOOGLE_REDIRECT_URI
        value: https://recipe-keeper.onrender.com/auth/google/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
